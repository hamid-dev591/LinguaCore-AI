<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCore AI Ultra - HamidDev Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- أضف هذا السطر لإخفاء تنبيه الـ Production -->
<script>window.tailwind = { config: { } }; console.warn = () => {};</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="dark-mode min-h-screen flex flex-col items-center p-4 pt-24">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                <i data-lucide="languages" class="w-5 text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tighter bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">LINGUACORE AI</span>
        </div>
        <div class="flex items-center gap-3">
            <div id="saveIndicator" class="text-[10px] font-bold text-green-400 opacity-0 transition-opacity">SAVED</div>
            <button id="themeToggle" class="p-2.5 rounded-xl glass-card"><i data-lucide="sun" id="themeIcon" class="w-5 text-yellow-400"></i></button>
            <button id="settingsBtn" class="p-2.5 rounded-xl glass-card"><i data-lucide="settings" class="w-5"></i></button>
        </div>
    </nav>

<main class="w-full max-w-6xl space-y-8">
    <div class="glass-card rounded-[3rem] p-8 md:p-12 shadow-2xl">
        <!-- أزرار التحكم الجديدة -->
        <div class="flex justify-end gap-2 mb-4">
            <button id="starBtn" class="p-3 rounded-xl hover:bg-yellow-500/20 text-yellow-500 transition-all" title="Add to Favorites"><i data-lucide="star" class="w-5"></i></button>
            <button id="exportBtn" class="p-3 rounded-xl hover:bg-green-500/20 text-green-500 transition-all" title="Export as JSON"><i data-lucide="download" class="w-5"></i></button>
        </div>

        <!-- قسم الاختيارات والترجمة كما هو سابقاً -->
        <div class="flex flex-col md:flex-row items-center gap-4 mb-10">
            <select id="fromLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold cursor-pointer transition-all">
                <option value="auto">Auto Detect Language</option>
            </select>
            <button id="swapBtn" class="p-5 rounded-full bg-white/5 hover:bg-indigo-500 transition-all"><i data-lucide="arrow-left-right" class="w-6"></i></button>
            <select id="toLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold cursor-pointer transition-all"></select>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="relative">
                <textarea id="inputText" placeholder="Type or paste content... (Ctrl+Enter to translate)" class="w-full h-80 bg-black/20 rounded-[2.5rem] p-10 text-2xl resize-none outline-none border border-white/5"></textarea>
                <div class="absolute bottom-8 left-8 flex items-center gap-3">
                    <button id="voiceBtn" class="p-4 bg-indigo-500/10 rounded-2xl hover:bg-indigo-500/20"><i data-lucide="mic" class="w-6"></i></button>
                    <button id="clearBtn" class="p-4 hover:text-red-400"><i data-lucide="trash-2" class="w-6"></i></button>
                </div>
            </div>
            <div class="relative">
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-md rounded-[2.5rem] hidden z-10">
                    <div class="loader w-14 h-14 border-4 border-t-transparent rounded-full"></div>
                </div>
                <textarea id="outputText" placeholder="Translation result..." readonly class="w-full h-80 bg-white/5 rounded-[2.5rem] p-10 text-2xl resize-none outline-none border border-white/5"></textarea>
                <div class="absolute bottom-8 right-8 flex items-center gap-3">
                    <button id="ttsBtn" class="p-4 hover:text-indigo-400"><i data-lucide="volume-2" class="w-6"></i></button>
                    <button id="copyBtn" class="p-4 hover:text-green-400"><i data-lucide="copy" class="w-6"></i></button>
                </div>
            </div>
        </div>
        <button id="translateBtn" class="w-full mt-10 py-6 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-[2rem] font-black text-xl text-white shadow-xl active:scale-95 transition-all tracking-widest uppercase">Start Translation</button>
    </div>

    <!-- قسم السجل والمفضلة (Tabs) -->
    <div class="glass-card rounded-[2.5rem] p-8">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-4">
                <button id="showHistory" class="text-xl font-bold flex items-center gap-2 border-b-2 border-indigo-500 pb-1">History</button>
                <button id="showFavorites" class="text-xl font-bold flex items-center gap-2 opacity-40 hover:opacity-100 transition-all pb-1">Favorites</button>
            </div>
            <button id="clearHistory" class="text-xs font-bold text-red-400 hover:underline uppercase">Clear All</button>
        </div>
        <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-96 overflow-y-auto pr-2"></div>
    </div>

    <!-- الـ Footer الذي طلبته -->
    <footer class="mt-12 text-center pb-8 flex flex-col md:flex-row items-center justify-center gap-4">
        <a href="https://github.com/hamid-dev591/LinguaCore-AI" target="_blank" class="inline-flex items-center gap-3 py-3 px-6 glass-card rounded-full hover:bg-white/10 transition-all border border-indigo-500/20 group">
            <i data-lucide="code-2" class="w-4 h-4 text-indigo-400"></i>
            <span class="text-xs font-bold uppercase tracking-tighter">Open Source</span>
        </a>
        <a href="https://hd1.vercel.app" target="_blank" class="inline-flex items-center gap-4 py-3 px-8 glass-card rounded-full hover:bg-white/10 transition-all group border border-indigo-500/20">
            <span class="text-xs opacity-50 uppercase tracking-widest font-bold">Created by</span>
            <span class="font-black text-indigo-400 group-hover:text-white">HamidDev</span>
            <i data-lucide="external-link" class="w-4 h-4 opacity-40"></i>
        </a>
    </footer>
</main>

    <div id="settingsMenu" class="hidden fixed top-24 right-10 w-72 glass-card rounded-[2rem] p-6 shadow-2xl z-50">
        <h3 class="font-bold mb-4 border-b border-white/10 pb-2">Preferences</h3>
        <div class="space-y-4">
            <div class="flex justify-between items-center"><span>Animations</span><input type="checkbox" id="animToggle" checked class="accent-indigo-500"></div>
            <div class="space-y-2"><span>Speech Speed</span><input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" class="w-full accent-purple-500"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
