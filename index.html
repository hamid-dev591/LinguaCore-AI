<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCore AI Ultra - HamidDev Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s ease; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark-mode { background: radial-gradient(circle at top right, #0f172a, #020617); color: white; }
        .light-mode { background: radial-gradient(circle at top left, #f8fafc, #e2e8f0); color: #1e293b; }
        .light-mode .glass-card { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0, 0, 0, 0.08); }
        
        /* حل مشكلة Screenshot_17 */
        select option { background-color: #1e293b !important; color: white !important; }
        .light-mode select option { background-color: white !important; color: #1e293b !important; }

        .history-item { transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
        .history-item:hover { background: rgba(99, 102, 241, 0.1); transform: translateX(5px); }
        
        .loader { border-top-color: #6366f1; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .active-mic { color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="dark-mode min-h-screen flex flex-col items-center p-4 pt-24">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                <i data-lucide="languages" class="w-5 text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tighter bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">LINGUACORE AI</span>
        </div>
        <div class="flex items-center gap-3">
            <div id="saveIndicator" class="text-[10px] font-bold text-green-400 opacity-0 transition-opacity">SAVED</div>
            <button id="themeToggle" class="p-2.5 rounded-xl glass-card"><i data-lucide="sun" id="themeIcon" class="w-5 text-yellow-400"></i></button>
            <button id="settingsBtn" class="p-2.5 rounded-xl glass-card"><i data-lucide="settings" class="w-5"></i></button>
        </div>
    </nav>

    <main class="w-full max-w-6xl space-y-8">
        <div class="glass-card rounded-[3rem] p-8 md:p-12 shadow-2xl">
            <div class="flex flex-col md:flex-row items-center gap-4 mb-10">
                <select id="fromLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold cursor-pointer transition-all">
                    <option value="auto">Auto Detect Language</option>
                </select>
                <button id="swapBtn" class="p-5 rounded-full bg-white/5 hover:bg-indigo-500 transition-all"><i data-lucide="arrow-left-right" class="w-6"></i></button>
                <select id="toLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold cursor-pointer transition-all"></select>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="relative">
                    <textarea id="inputText" placeholder="Type or paste content..." class="w-full h-80 bg-black/20 rounded-[2.5rem] p-10 text-2xl resize-none outline-none border border-white/5"></textarea>
                    <div class="absolute bottom-8 left-8 flex items-center gap-3">
                        <button id="voiceBtn" class="p-4 bg-indigo-500/10 rounded-2xl hover:bg-indigo-500/20"><i data-lucide="mic" class="w-6"></i></button>
                        <input type="file" id="audioFile" accept="audio/*" class="hidden">
                        <button id="uploadBtn" class="p-4 bg-purple-500/10 rounded-2xl hover:bg-purple-500/20 text-purple-400"><i data-lucide="file-audio" class="w-6"></i></button>
                        <button id="clearBtn" class="p-4 hover:text-red-400"><i data-lucide="trash-2" class="w-6"></i></button>
                    </div>
                </div>
                <div class="relative">
                    <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-md rounded-[2.5rem] hidden z-10">
                        <div class="loader w-14 h-14 border-4 border-t-transparent rounded-full"></div>
                    </div>
                    <textarea id="outputText" placeholder="Translation result..." readonly class="w-full h-80 bg-white/5 rounded-[2.5rem] p-10 text-2xl resize-none outline-none border border-white/5"></textarea>
                    <div class="absolute bottom-8 right-8 flex items-center gap-3">
                        <button id="ttsBtn" class="p-4 hover:text-indigo-400"><i data-lucide="volume-2" class="w-6"></i></button>
                        <button id="copyBtn" class="p-4 hover:text-green-400"><i data-lucide="copy" class="w-6"></i></button>
                    </div>
                </div>
            </div>
            <button id="translateBtn" class="w-full mt-10 py-6 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-[2rem] font-black text-xl text-white shadow-xl active:scale-95 transition-all tracking-widest">START TRANSLATION</button>
        </div>

        <!-- History Section -->
        <div class="glass-card rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="history" class="w-5 text-indigo-400"></i> Translation History</h2>
                <button id="clearHistory" class="text-xs font-bold text-red-400 hover:underline uppercase">Clear All</button>
            </div>
            <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-96 overflow-y-auto pr-2"></div>
        </div>
    </main>

    <div id="settingsMenu" class="hidden fixed top-24 right-10 w-72 glass-card rounded-[2rem] p-6 shadow-2xl z-50">
        <h3 class="font-bold mb-4 border-b border-white/10 pb-2">Preferences</h3>
        <div class="space-y-4">
            <div class="flex justify-between items-center"><span>Animations</span><input type="checkbox" id="animToggle" checked class="accent-indigo-500"></div>
            <div class="space-y-2"><span>Speech Speed</span><input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" class="w-full accent-purple-500"></div>
        </div>
    </div>
            <footer class="mt-12 text-center pb-8">
            <a href="https://hd1.vercel.app" target="_blank" class="inline-flex items-center gap-4 py-3 px-8 glass-card rounded-full hover:bg-white/10 transition-all group border border-indigo-500/20">
                 
                <span class="text-xs opacity-50 uppercase tracking-widest font-bold">Created by</span>
                <span class="font-black text-indigo-400 group-hover:text-white">HamidDev</span>
                <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-40 group-hover:opacity-100 group-hover:translate-x-1 group-hover:-translate-y-1 transition-all"></i>
            </a>
        </footer>
    </main>

    <script>
        lucide.createIcons();
        // القائمة الكاملة للغات
        const languages = {
            "en-GB": "English", "ar-SA": "Arabic", "fr-FR": "French", "es-ES": "Spanish", 
            "de-DE": "German", "it-IT": "Italian", "tr-TR": "Turkish", "ru-RU": "Russian",
            "zh-CN": "Chinese", "ja-JP": "Japanese", "ko-KR": "Korean", "hi-IN": "Hindi",
            "pt-PT": "Portuguese", "nl-NL": "Dutch", "pl-PL": "Polish", "vi-VN": "Vietnamese",
            "id-ID": "Indonesian", "th-TH": "Thai", "sv-SE": "Swedish", "fa-IR": "Persian",
            "he-IL": "Hebrew", "el-GR": "Greek", "ur-PK": "Urdu", "bn-BD": "Bengali"
        };

        const fromLang = document.getElementById('fromLang'), toLang = document.getElementById('toLang'), inputText = document.getElementById('inputText'), outputText = document.getElementById('outputText'), historyList = document.getElementById('historyList');

        Object.entries(languages).forEach(([code, name]) => {
            fromLang.add(new Option(name, code));
            toLang.add(new Option(name, code));
        });

        let history = JSON.parse(localStorage.getItem('linguaCore_History')) || [];

        function saveState() {
            const data = { input: inputText.value, output: outputText.value, from: fromLang.value, to: toLang.value, theme: document.body.classList.contains('dark-mode') ? 'dark' : 'light', speed: document.getElementById('speechSpeed').value };
            localStorage.setItem('linguaCore_State', JSON.stringify(data));
            document.getElementById('saveIndicator').style.opacity = '1';
            setTimeout(() => document.getElementById('saveIndicator').style.opacity = '0', 1000);
        }

        function updateHistoryUI() {
            historyList.innerHTML = history.length ? '' : '<p class="col-span-full text-center opacity-30 py-10">No history found</p>';
            history.slice().reverse().forEach((item) => {
                const div = document.createElement('div');
                div.className = 'history-item glass-card p-5 rounded-2xl flex flex-col gap-1';
                div.innerHTML = `<div class="flex justify-between items-start"><p class="font-bold text-sm truncate w-4/5">${item.input}</p><span class="text-[9px] bg-indigo-500/20 px-2 py-0.5 rounded text-indigo-300 font-bold uppercase">${item.lang}</span></div><p class="text-xs opacity-50 truncate">${item.output}</p>`;
                div.onclick = () => { inputText.value = item.input; outputText.value = item.output; saveState(); };
                historyList.appendChild(div);
            });
        }

        async function translate() {
            if(!inputText.value.trim()) return;
            document.getElementById('loader').classList.remove('hidden');
            try {
                const source = fromLang.value === 'auto' ? '' : fromLang.value.split('-')[0];
                const target = toLang.value.split('-')[0];
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputText.value)}&langpair=${source}|${target}`);
                const data = await res.json();
                outputText.value = data.responseData.translatedText;
                
                history.push({ input: inputText.value, output: outputText.value, lang: target });
                if(history.length > 20) history.shift();
                localStorage.setItem('linguaCore_History', JSON.stringify(history));
                updateHistoryUI();
                saveState();
            } catch (e) { alert("API Error"); }
            document.getElementById('loader').classList.add('hidden');
        }

        document.getElementById('translateBtn').onclick = translate;
        document.getElementById('clearHistory').onclick = () => { history = []; localStorage.removeItem('linguaCore_History'); updateHistoryUI(); };
        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            saveState();
        };

        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Rec) {
            const r = new Rec();
            document.getElementById('voiceBtn').onclick = () => { r.start(); document.getElementById('voiceBtn').classList.add('active-mic'); };
            r.onresult = (e) => { inputText.value = e.results[0][0].transcript; saveState(); };
            r.onend = () => document.getElementById('voiceBtn').classList.remove('active-mic');
        }

        document.getElementById('uploadBtn').onclick = () => document.getElementById('audioFile').click();
        document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(outputText.value); alert("Copied!"); };
        document.getElementById('clearBtn').onclick = () => { inputText.value = ''; outputText.value = ''; saveState(); };
        document.getElementById('ttsBtn').onclick = () => {
            const m = new SpeechSynthesisUtterance(outputText.value);
            m.lang = toLang.value;
            m.rate = document.getElementById('speechSpeed').value;
            window.speechSynthesis.speak(m);
        };
        document.getElementById('settingsBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('settingsMenu').classList.toggle('hidden'); };
        
        [inputText, fromLang, toLang].forEach(el => el.addEventListener('input', saveState));

        window.onload = () => {
            const state = JSON.parse(localStorage.getItem('linguaCore_State'));
            if(state) {
                inputText.value = state.input || ""; 
                outputText.value = state.output || ""; 
                fromLang.value = state.from || "auto"; 
                toLang.value = state.to || "en-GB";
                if(state.theme === 'light') document.body.classList.replace('dark-mode', 'light-mode');
            }
            updateHistoryUI();
        };
        window.onclick = () => document.getElementById('settingsMenu').classList.add('hidden');
        document.getElementById('settingsMenu').onclick = (e) => e.stopPropagation();
    </script>
</body>
</html>
