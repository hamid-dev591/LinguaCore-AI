<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCore AI Ultra - HamidDev Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark-mode { background: radial-gradient(circle at top right, #0f172a, #020617); color: white; }
        .light-mode { background: radial-gradient(circle at top left, #f8fafc, #e2e8f0); color: #1e293b; }
        .light-mode .glass-card { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0, 0, 0, 0.08); }
        
        /* Animation Controller */
        .no-animations *, .no-animations *:before, .no-animations *:after {
            transition-duration: 0s !important;
            animation-duration: 0s !important;
            transition-delay: 0s !important;
            animation-delay: 0s !important;
        }

        .loader { border-top-color: #6366f1; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Fix for the select dropdown visibility in various modes */
        select option {
            background-color: #1e293b !important; /* Dark background for options */
            color: white !important;
            padding: 10px;
        }
        .light-mode select option {
            background-color: white !important;
            color: #1e293b !important;
        }

        textarea { scrollbar-width: thin; scrollbar-color: rgba(99, 102, 241, 0.3) transparent; }
        .active-mic { color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="dark-mode min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Advanced Navigation -->
    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                <i data-lucide="languages" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tighter bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
                LINGUACORE AI
            </span>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="saveIndicator" class="text-[10px] uppercase tracking-widest opacity-0 transition-opacity duration-300 font-bold text-green-400">Saved</div>
            <button id="themeToggle" class="p-2.5 rounded-xl glass-card hover:scale-110 transition-all">
                <i data-lucide="sun" id="themeIcon" class="w-5 h-5 text-yellow-400"></i>
            </button>
            <div class="relative">
                <button id="settingsBtn" class="p-2.5 rounded-xl glass-card hover:rotate-90 transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <div id="settingsMenu" class="hidden absolute right-0 mt-4 w-64 glass-card rounded-2xl p-4 shadow-2xl z-[100] space-y-4 text-left">
                    <h3 class="font-bold text-sm border-b border-white/10 pb-2">Preferences</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold">Animations</span>
                        <input type="checkbox" id="animToggle" checked class="accent-indigo-500">
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="text-xs font-semibold">Speech Speed</span>
                        <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" class="w-full accent-purple-500">
                    </div>
                    <button id="resetApp" class="w-full py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-xs font-bold transition-colors">
                        Reset All Data
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-6xl mt-20">
        <div class="glass-card rounded-[3rem] p-6 md:p-12 shadow-2xl relative overflow-hidden text-center">
            <!-- Language Selection -->
            <div class="flex flex-col md:flex-row items-center gap-4 mb-10">
                <div class="w-full relative group">
                    <select id="fromLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold cursor-pointer transition-all">
                        <option value="auto">Auto Detect Language</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 w-5 h-5 opacity-40"></i>
                </div>

                <button id="swapBtn" class="p-5 rounded-full bg-white/5 hover:bg-indigo-500 hover:text-white transition-all transform active:scale-90 shadow-lg">
                    <i data-lucide="arrow-left-right" class="w-6 h-6"></i>
                </button>

                <div class="w-full relative group">
                    <select id="toLang" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 appearance-none focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold cursor-pointer transition-all">
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 w-5 h-5 opacity-40"></i>
                </div>
            </div>

            <!-- Content -->
            <div class="grid md:grid-cols-2 gap-8">
                <div class="relative group">
                    <textarea id="inputText" placeholder="Type, paste, or upload audio content..." 
                        class="w-full h-80 bg-black/20 rounded-[2.5rem] p-10 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-2xl resize-none border border-white/5 text-left"></textarea>
                    
                    <div class="absolute bottom-8 left-8 flex items-center gap-3">
                        <button id="voiceBtn" title="Speech to Text" class="p-4 bg-indigo-500/10 rounded-2xl hover:bg-indigo-500/20 transition-all"><i data-lucide="mic" class="w-6 h-6"></i></button>
                        <input type="file" id="audioFile" accept="audio/*" class="hidden">
                        <button id="uploadBtn" title="Analyze Audio File" class="p-4 bg-purple-500/10 rounded-2xl hover:bg-purple-500/20 transition-all text-purple-400">
                            <i data-lucide="file-audio" class="w-6 h-6"></i>
                        </button>
                        <button id="clearBtn" title="Clear Content" class="p-4 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                    </div>
                </div>

                <div class="relative">
                    <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 backdrop-blur-md rounded-[2.5rem] hidden z-10 transition-all">
                        <div class="loader w-14 h-14 border-4 border-indigo-200/20 border-t-indigo-500 rounded-full mb-4"></div>
                        <span class="text-xs font-bold tracking-widest text-indigo-400">AI PROCESSING...</span>
                    </div>
                    <textarea id="outputText" placeholder="Translation result..." readonly
                        class="w-full h-80 bg-white/5 rounded-[2.5rem] p-10 text-2xl resize-none border border-white/5 focus:outline-none text-left"></textarea>
                    
                    <div class="absolute bottom-8 right-8 flex items-center gap-3">
                        <button id="ttsBtn" title="Listen Translation" class="p-4 hover:text-indigo-400 transition-all"><i data-lucide="volume-2" class="w-6 h-6"></i></button>
                        <button id="copyBtn" title="Copy to Clipboard" class="p-4 hover:text-green-400 transition-all"><i data-lucide="copy" class="w-6 h-6"></i></button>
                    </div>
                </div>
            </div>

            <button id="translateBtn" class="w-full mt-10 py-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:shadow-[0_0_40px_rgba(99,102,241,0.4)] rounded-[2rem] font-black text-xl text-white transition-all transform active:scale-[0.98] tracking-widest">
                START TRANSLATION
            </button>
        </div>

        <footer class="mt-12 text-center pb-8">
            <a href="https://hd1.vercel.app" target="_blank" class="inline-flex items-center gap-4 py-3 px-8 glass-card rounded-full hover:bg-white/10 transition-all group border border-indigo-500/20">
                <span class="text-xs opacity-50 uppercase tracking-widest font-bold">Created by</span>
                <span class="font-black text-indigo-400 group-hover:text-white">HamidDev</span>
                <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-40 group-hover:opacity-100 group-hover:translate-x-1 group-hover:-translate-y-1 transition-all"></i>
            </a>
        </footer>
    </main>

    <script>
        lucide.createIcons();

        const languages = {
            "en-GB": "English", "ar-SA": "Arabic", "fr-FR": "French", "es-ES": "Spanish", 
            "de-DE": "German", "it-IT": "Italian", "tr-TR": "Turkish", "ru-RU": "Russian",
            "zh-CN": "Chinese", "ja-JP": "Japanese", "ko-KR": "Korean", "hi-IN": "Hindi",
            "pt-PT": "Portuguese", "nl-NL": "Dutch", "pl-PL": "Polish", "vi-VN": "Vietnamese",
            "id-ID": "Indonesian", "th-TH": "Thai", "sv-SE": "Swedish", "fa-IR": "Persian",
            "he-IL": "Hebrew", "el-GR": "Greek", "ur-PK": "Urdu", "bn-BD": "Bengali"
        };

        const fromLang = document.getElementById('fromLang');
        const toLang = document.getElementById('toLang');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const voiceBtn = document.getElementById('voiceBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const animToggle = document.getElementById('animToggle');
        const speechSpeed = document.getElementById('speechSpeed');
        const loader = document.getElementById('loader');
        const saveIndicator = document.getElementById('saveIndicator');

        // Populate selects
        Object.entries(languages).forEach(([code, name]) => {
            fromLang.add(new Option(name, code));
            toLang.add(new Option(name, code));
        });

        // --- Auto-Save Core Logic ---
        const saveToLocal = () => {
            const appData = {
                inputText: inputText.value,
                outputText: outputText.value,
                fromLang: fromLang.value,
                toLang: toLang.value,
                theme: document.body.classList.contains('dark-mode') ? 'dark' : 'light',
                anims: animToggle.checked,
                speed: speechSpeed.value
            };
            localStorage.setItem('linguaCore_Data', JSON.stringify(appData));
            saveIndicator.style.opacity = '1';
            setTimeout(() => saveIndicator.style.opacity = '0', 1000);
        };

        const loadFromLocal = () => {
            const data = JSON.parse(localStorage.getItem('linguaCore_Data'));
            if (data) {
                inputText.value = data.inputText || "";
                outputText.value = data.outputText || "";
                fromLang.value = data.fromLang || "auto";
                toLang.value = data.toLang || "en-GB";
                speechSpeed.value = data.speed || 1;
                animToggle.checked = data.anims !== false;
                
                if (data.theme === 'light') {
                    document.body.classList.replace('dark-mode', 'light-mode');
                    document.getElementById('themeIcon').setAttribute('data-lucide', 'moon');
                }
                if (!animToggle.checked) document.body.classList.add('no-animations');
                lucide.createIcons();
            }
        };

        // Listen for changes to auto-save
        [inputText, fromLang, toLang, speechSpeed, animToggle].forEach(el => {
            el.addEventListener('change', saveToLocal);
            if (el.tagName === 'TEXTAREA') el.addEventListener('input', saveToLocal);
        });

        // --- Standard Features ---
        async function runTranslation() {
            if(!inputText.value.trim()) return;
            loader.classList.remove('hidden');
            const source = fromLang.value === 'auto' ? '' : fromLang.value.split('-')[0];
            const target = toLang.value.split('-')[0];
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputText.value)}&langpair=${source}|${target}`);
                const data = await res.json();
                outputText.value = data.responseData.translatedText;
                saveToLocal();
            } catch (err) { alert("API Error"); } finally { loader.classList.add('hidden'); }
        }

        document.getElementById('translateBtn').addEventListener('click', runTranslation);

        // Voice
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Rec) {
            const r = new Rec();
            voiceBtn.onclick = () => { r.start(); voiceBtn.classList.add('active-mic'); };
            r.onresult = (e) => { inputText.value = e.results[0][0].transcript; saveToLocal(); };
            r.onend = () => voiceBtn.classList.remove('active-mic');
        }

        // Utils
        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            saveToLocal();
        };

        document.getElementById('settingsBtn').onclick = (e) => { e.stopPropagation(); settingsMenu.classList.toggle('hidden'); };
        document.getElementById('swapBtn').onclick = () => {
            if(fromLang.value === 'auto') return;
            [fromLang.value, toLang.value] = [toLang.value, fromLang.value];
            [inputText.value, outputText.value] = [outputText.value, inputText.value];
            saveToLocal();
        };
        document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(outputText.value); alert("Copied!"); };
        document.getElementById('clearBtn').onclick = () => { inputText.value = ''; outputText.value = ''; saveToLocal(); };
        document.getElementById('ttsBtn').onclick = () => {
            const m = new SpeechSynthesisUtterance(outputText.value);
            m.lang = toLang.value;
            m.rate = speechSpeed.value;
            window.speechSynthesis.speak(m);
        };
        document.getElementById('resetApp').onclick = () => { localStorage.clear(); location.reload(); };

        window.onclick = () => settingsMenu.classList.add('hidden');
        settingsMenu.onclick = (e) => e.stopPropagation();
        
        // Initialize
        loadFromLocal();
    </script>
</body>
</html>
