<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCore AI - Pro Visual Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050a15; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-tab-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; border-radius: 99px; font-weight: 700; transition: all 0.4s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-tab-btn.active { background: linear-gradient(135deg, #4f46e5, #9333ea); border: none; box-shadow: 0 0 20px rgba(79, 70, 229, 0.4); }
        .loader-ring { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .history-item { border-left: 3px solid transparent; transition: 0.3s; }
        .history-item:hover { border-left-color: #6366f1; background: rgba(255,255,255,0.03); }
        select option { background: #0f172a; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        /* تحسين استجابة اللمس في الهاتف لمحرر الصور */
.cropper-container {
    touch-action: none; /* يمنع المتصفح من سحب الصفحة أثناء القص */
}
#cropperImage {
    max-height: 60vh; /* يضمن عدم خروج الصورة عن شاشة الهاتف */
}
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                <i data-lucide="scan-eye" class="text-white w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">LinguaCore <span class="text-indigo-500">Pro</span></h1>
                <p class="text-[9px] font-bold text-white/30 tracking-[0.3em] uppercase mt-1">HamidDev Neural Systems</p>
            </div>
        </div>
        <div id="saveIndicator" class="hidden md:block text-[10px] font-black text-emerald-400 opacity-0 transition-all duration-500 bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20">DATA SYNCHRONIZED</div>
    </nav>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-4 gap-8">
        
        <div class="lg:col-span-1 space-y-6 order-2 lg:order-1">
            <div class="glass-card rounded-[2rem] p-6 h-[700px] flex flex-col border-indigo-500/10">
                <div class="flex gap-2 mb-6 p-1 bg-white/5 rounded-2xl">
                    <button onclick="switchTab('history')" id="tabHistory" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest bg-indigo-600 transition-all">History</button>
                    <button onclick="switchTab('favs')" id="tabFavs" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition-all">Favorites</button>
                </div>
                <div id="sideContent" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-8 order-1 lg:order-2">
            <div class="flex justify-start gap-4">
                <a href="index.html" class="nav-tab-btn text-white/40 hover:text-white hover:bg-white/5"><i data-lucide="type" class="w-5 h-5"></i> Text Mode</a>
                <button class="nav-tab-btn active"><i data-lucide="camera" class="w-5 h-5"></i> Visual Mode</button>
            </div>

            <div class="glass-card rounded-[3rem] p-8 md:p-12 border-white/10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-600/10 blur-[100px] -z-10"></div>
                
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                    <div class="space-y-1">
                        <h2 class="text-4xl font-black italic uppercase tracking-tighter bg-gradient-to-r from-white to-white/40 bg-clip-text text-transparent">Image Processor</h2>
                        <p class="text-[10px] font-bold text-indigo-400/60 uppercase tracking-[0.4em]">Multi-Neural OCR & Translate</p>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <span class="text-[9px] font-black text-white/20 uppercase tracking-widest px-4">Select Target Language</span>
<select id="targetLanguage" onchange="translateOnly()" class="bg-white/5 border border-white/10 rounded-2xl px-8 py-4 font-bold outline-none cursor-pointer hover:border-indigo-500/30 transition-all text-sm min-w-[220px]">
    <option value="ar">Arabic (العربية)</option>
    <option value="en">English (US)</option>
    <option value="fr">French (Français)</option>
    <option value="es">Spanish (Español)</option>
    <option value="de">German (Deutsch)</option>
    <option value="it">Italian (Italiano)</option>
    <option value="tr">Turkish (Türkçe)</option>
    <option value="ru">Russian (Русский)</option>
    <option value="zh">Chinese (中文)</option>
    <option value="ja">Japanese (日本語)</option>
    <option value="ko">Korean (한국어)</option>
    <option value="hi">Hindi (हिन्दी)</option>
    <option value="fa">Persian (فارسی)</option>
    <option value="ur">Urdu (اردو)</option>
</select>
                    </div>
                </div>

                <div class="flex justify-end mb-2">
    <button onclick="addToFavs()" class="flex items-center gap-2 px-4 py-2 bg-indigo-500/10 hover:bg-indigo-500/20 rounded-xl border border-indigo-500/20 transition-all group">
        <i data-lucide="star" class="w-4 h-4 text-yellow-500 group-hover:fill-yellow-500"></i>
        <span class="text-[10px] font-black uppercase">Add to Favorites</span>
    </button>
</div>

                <div id="dropZone" class="group relative w-full h-80 bg-white/[0.02] border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500/40 hover:bg-indigo-500/[0.02] transition-all duration-700">
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                    <div id="placeholder" class="flex flex-col items-center gap-4">
                        <div class="w-20 h-20 bg-indigo-500/10 rounded-[2rem] flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-500">
                            <i data-lucide="upload-cloud" class="w-10 h-10 text-indigo-400"></i>
                        </div>
                        <p class="text-lg font-bold text-white/60">Drop image or click to upload</p>
                    </div>
                    <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-8 rounded-[2.5rem]">
                </div>

                <div class="mt-6 flex items-center gap-3 px-6 py-3 bg-white/5 rounded-2xl border border-white/5 w-fit">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="autoCopy" class="hidden peer" checked>
                        <div class="w-10 h-5 bg-white/10 rounded-full peer-checked:bg-indigo-600 transition-all relative">
                            <div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full peer-checked:translate-x-5 transition-all"></div>
                        </div>
                        <span class="text-[10px] font-black uppercase text-white/40 group-hover:text-white">Auto-Copy to Clipboard</span>
                    </label>
                </div>

                <div id="status" class="hidden py-12 flex flex-col items-center gap-4">
                    <div class="loader-ring"></div>
                    <p class="text-xs font-black text-indigo-400 animate-pulse uppercase">Processing...</p>
                </div>

                <div id="resultArea" class="hidden mt-12 space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] px-2">Raw Text</label>
                            <div id="rawText" class="bg-black/40 rounded-[2rem] p-8 min-h-[200px] border border-white/5 overflow-y-auto"></div>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] px-2">Translation</label>
                            <div id="translatedText" class="bg-indigo-500/[0.03] rounded-[2rem] p-8 min-h-[200px] border border-indigo-500/10 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="cropperModal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-2xl bg-[#0f172a] rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
            <h3 class="text-xl font-black uppercase mb-6 text-center text-indigo-400">Fine Tune Image</h3>
            <div class="h-[400px] bg-black/40 rounded-2xl overflow-hidden mb-8">
                <img id="cropperImage" class="max-w-full">
            </div>
            <div class="flex gap-4">
                <button onclick="rotateImg()" class="p-5 bg-white/5 rounded-2xl hover:bg-white/10 text-white"><i data-lucide="rotate-cw"></i></button>
                <button onclick="executeOCR()" class="flex-1 py-5 bg-indigo-600 rounded-2xl font-black uppercase text-white">Process Image</button>
                <button onclick="closeModal()" class="px-8 py-5 bg-red-500/10 text-red-500 rounded-2xl font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script>
        lucide.createIcons();
        let activeText = "", cropper, currentView = 'history';

        const imgInput = document.getElementById('imageInput');
        document.getElementById('dropZone').onclick = () => imgInput.click();

        imgInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) openEditor(file);
        };

        function openEditor(file) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = document.getElementById('cropperImage');
                img.src = f.target.result;
                document.getElementById('cropperModal').classList.remove('hidden');
                if(cropper) cropper.destroy();
                cropper = new Cropper(img, { viewMode: 1, autoCropArea: 0.8 });
            };
            reader.readAsDataURL(file);
        }

        function rotateImg() { if(cropper) cropper.rotate(90); }
        function closeModal() { document.getElementById('cropperModal').classList.add('hidden'); }

        // إنشاء عامل معالجة واحد (Worker) لتسريع العملية
let worker = null;

async function executeOCR() {
    if(!cropper) return;
    const canvas = cropper.getCroppedCanvas();
    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // تقليل الجودة قليلاً لتسريع المعالجة في الهاتف
    closeModal();
    
    document.getElementById('status').classList.remove('hidden');
    document.getElementById('resultArea').classList.add('hidden');

    try {
        // إنشاء العامل مرة واحدة فقط لتوفير الوقت
        if (!worker) {
            worker = Tesseract.createWorker();
            await worker.load();
            await worker.loadLanguage('ara+eng');
            await worker.initialize('ara+eng');
        }

        const { data: { text } } = await worker.recognize(dataUrl);
        activeText = text;
        document.getElementById('rawText').innerText = activeText;
        
        await translateOnly(); // استدعاء الترجمة فوراً
        
        if(document.getElementById('autoCopy').checked) {
            navigator.clipboard.writeText(document.getElementById('translatedText').innerText);
            showFlash();
        }
    } catch (err) { 
        console.error("OCR Error:", err);
    }
    document.getElementById('status').classList.add('hidden');
}
        async function translateOnly() {
    if (!activeText || activeText.trim() === "") return;
    const target = document.getElementById('targetLanguage').value;
    
    try {
        // استخدام محرك جوجل المباشر (أسرع وأكثر استقراراً للهواتف)
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(activeText)}`;
        
        const res = await fetch(url);
        const data = await res.json();
        
        // تجميع النص المترجم بشكل صحيح
        const translatedResult = data[0].map(s => s[0]).join('');
        
        const out = document.getElementById('translatedText');
        out.innerText = translatedResult;
        
        // ضبط اتجاه النص (RTL) للغات الشرقية
        const rtlLangs = ['ar', 'fa', 'ur', 'he'];
        out.dir = rtlLangs.includes(target) ? 'rtl' : 'ltr';
        
        document.getElementById('resultArea').classList.remove('hidden');
    } catch (err) {
        console.error("Translation Error:", err);
    }
}
        function showFlash() {
            const s = document.getElementById('saveIndicator');
            s.style.opacity = "1"; s.classList.remove('hidden');
            setTimeout(() => s.style.opacity = "0", 2500);
        }

        function switchTab(t) {
            currentView = t;
            document.getElementById('tabHistory').className = `flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${t==='history'?'bg-indigo-600 shadow-lg':'hover:bg-white/5'}`;
            document.getElementById('tabFavs').className = `flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${t==='favs'?'bg-indigo-600 shadow-lg':'hover:bg-white/5'}`;
        }

        // دالة تدعم رفع أكثر من صورة (دفعات)
// مصفوفات البيانات
let history = JSON.parse(localStorage.getItem('linguaCore_History')) || [];
let favorites = JSON.parse(localStorage.getItem('linguaCore_Favorites')) || [];
let batchFiles = []; // لدعم رفع أكثر من صورة

// دالة رفع الصور المتعددة
imgInput.onchange = (e) => {
    batchFiles = Array.from(e.target.files);
    if (batchFiles.length > 0) {
        openEditor(batchFiles[0]);
    }
};

// دالة إضافة للمفضلة (الحل المطلوب)
function addToFavs() {
    const input = document.getElementById('rawText').innerText;
    const output = document.getElementById('translatedText').innerText;
    const lang = document.getElementById('targetLanguage').value;

    if (!input.trim() || !output.trim()) return;

    const item = { 
        input: input, 
        output: output, 
        lang: lang,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };

    // منع التكرار
    if (!favorites.some(f => f.input === input)) {
        favorites.push(item);
        localStorage.setItem('linguaCore_Favorites', JSON.stringify(favorites));
        showFlash("Added to Favorites!");
        if (currentView === 'favs') updateDisplayUI();
    }
}

// دالة تحديث السجل والمفضلة في الجانب
function updateDisplayUI() {
    const container = document.getElementById('sideContent');
    const list = currentView === 'history' ? history : favorites;
    
    if(!container) return;
    container.innerHTML = list.length ? '' : `<p class="text-center opacity-20 py-20 text-[10px] font-black uppercase">No Data</p>`;

    list.slice().reverse().forEach((item) => {
        const div = document.createElement('div');
        div.className = 'history-item glass-card p-4 rounded-2xl flex flex-col gap-1 cursor-pointer hover:bg-white/5 transition-all';
        div.innerHTML = `
            <div class="flex justify-between items-center mb-1">
                <span class="text-[8px] font-black text-indigo-400 uppercase">${item.lang}</span>
                <span class="text-[8px] opacity-30">${item.time || ''}</span>
            </div>
            <p class="text-[10px] font-bold truncate opacity-80">${item.input}</p>
            <p class="text-[9px] truncate opacity-40 italic">${item.output}</p>
        `;
        div.onclick = () => {
            document.getElementById('rawText').innerText = item.input;
            document.getElementById('translatedText').innerText = item.output;
            document.getElementById('resultArea').classList.remove('hidden');
        };
        container.appendChild(div);
    });
}

// تأكد من استدعاء التحديث عند تشغيل الصفحة
window.onload = () => {
    updateDisplayUI();
    lucide.createIcons();
};

// تعريف المصفوفات لجلب البيانات من الذاكرة


// دالة تحديث واجهة السجل والمفضلة
function updateDisplayUI() {
    const list = currentView === 'history' ? history : favorites;
    const container = document.getElementById('sideContent');
    if(!container) return;

    container.innerHTML = list.length ? '' : `<p class="text-center opacity-30 py-10 text-[10px]">Empty</p>`;
    
    list.slice().reverse().forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item glass-card p-4 rounded-2xl flex flex-col gap-1 cursor-pointer';
        div.innerHTML = `
            <div class="flex justify-between items-start">
                <p class="font-bold text-[10px] truncate w-4/5">${item.input}</p>
                <span class="text-[8px] bg-indigo-500/20 px-2 py-0.5 rounded text-indigo-300">${item.lang}</span>
            </div>
        `;
        div.onclick = () => {
            activeText = item.input;
            document.getElementById('rawText').innerText = item.input;
            document.getElementById('translatedText').innerText = item.output;
            document.getElementById('resultArea').classList.remove('hidden');
        };
        container.appendChild(div);
    });
}

// دالة تفعيل زر المفضلة (أضف هذا الكود ليتم استدعاؤه عند الضغط على زر النجمة)
function addToFavs() {
    const input = document.getElementById('rawText').innerText;
    const output = document.getElementById('translatedText').innerText;
    const lang = document.getElementById('targetLanguage').value;

    if (!input || !output) return;

    const item = { input, output, lang };
    if (!favorites.some(f => f.input === input)) {
        favorites.push(item);
        localStorage.setItem('linguaCore_Favorites', JSON.stringify(favorites));
        showFlash(); // إظهار مؤشر المزامنة
        if (currentView === 'favs') updateDisplayUI();
    }
}
    </script>
</body>
</html>
