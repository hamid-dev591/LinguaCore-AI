<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCore AI - Pro Visual Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050a15; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-tab-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; border-radius: 99px; font-weight: 700; transition: all 0.4s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-tab-btn.active { background: linear-gradient(135deg, #4f46e5, #9333ea); border: none; box-shadow: 0 0 20px rgba(79, 70, 229, 0.4); }
        .loader-ring { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .history-item { border-left: 3px solid transparent; transition: 0.3s; }
        .history-item:hover { border-left-color: #6366f1; background: rgba(255,255,255,0.03); }
        select option { background: #0f172a; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                <i data-lucide="scan-eye" class="text-white w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">LinguaCore <span class="text-indigo-500">Pro</span></h1>
                <p class="text-[9px] font-bold text-white/30 tracking-[0.3em] uppercase mt-1">HamidDev Neural Systems</p>
            </div>
        </div>
        <div id="saveIndicator" class="hidden md:block text-[10px] font-black text-emerald-400 opacity-0 transition-all duration-500 bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20">DATA SYNCHRONIZED</div>
    </nav>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-4 gap-8">
        
        <!-- Sidebar: History & Favs -->
        <div class="lg:col-span-1 space-y-6 order-2 lg:order-1">
            <div class="glass-card rounded-[2rem] p-6 h-[700px] flex flex-col border-indigo-500/10">
                <div class="flex gap-2 mb-6 p-1 bg-white/5 rounded-2xl">
                    <button onclick="switchTab('history')" id="tabHistory" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest bg-indigo-600 transition-all">History</button>
                    <button onclick="switchTab('favs')" id="tabFavs" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition-all">Favorites</button>
                </div>
                <div id="sideContent" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    <!-- Dynamic Items -->
                </div>
            </div>
        </div>

        <!-- Main Engine -->
        <div class="lg:col-span-3 space-y-8 order-1 lg:order-2">
            <div class="flex justify-start gap-4">
                <a href="index.html" class="nav-tab-btn text-white/40 hover:text-white hover:bg-white/5"><i data-lucide="type" class="w-5 h-5"></i> Text Mode</a>
                <button class="nav-tab-btn active"><i data-lucide="camera" class="w-5 h-5"></i> Visual Mode</button>
            </div>

            <div class="glass-card rounded-[3rem] p-8 md:p-12 border-white/10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-600/10 blur-[100px] -z-10"></div>
                
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                    <div class="space-y-1">
                        <h2 class="text-4xl font-black italic uppercase tracking-tighter bg-gradient-to-r from-white to-white/40 bg-clip-text text-transparent">Image Processor</h2>
                        <p class="text-[10px] font-bold text-indigo-400/60 uppercase tracking-[0.4em]">Multi-Neural OCR & Translate</p>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <span class="text-[9px] font-black text-white/20 uppercase tracking-widest px-4">Select Target Language</span>
                        <select id="targetLanguage" onchange="translateOnly()" class="bg-white/5 border border-white/10 rounded-2xl px-8 py-4 font-bold outline-none cursor-pointer hover:border-indigo-500/30 transition-all text-sm min-w-[220px]">
                            <option value="ar">Arabic (العربية)</option>
                            <option value="en">English (US)</option>
                            <option value="fr">French (Français)</option>
                            <option value="de">German (Deutsch)</option>
                            <option value="es">Spanish (Español)</option>
                            <option value="tr">Turkish (Türkçe)</option>
                            <option value="ru">Russian (Русский)</option>
                            <option value="zh-CN">Chinese (Simplified)</option>
                            <option value="ja">Japanese (日本語)</option>
                            <option value="it">Italian (Italiano)</option>
                            <option value="hi">Hindi (हिन्दी)</option>
                            <option value="ko">Korean (한국어)</option>
                        </select>
                    </div>
                </div>

                <!-- Dropzone -->
                <div id="dropZone" class="group relative w-full h-80 bg-white/[0.02] border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500/40 hover:bg-indigo-500/[0.02] transition-all duration-700">
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                    <div id="placeholder" class="flex flex-col items-center gap-4">
                        <div class="w-20 h-20 bg-indigo-500/10 rounded-[2rem] flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-500">
                            <i data-lucide="upload-cloud" class="w-10 h-10 text-indigo-400"></i>
                        </div>
                        <div class="text-center">
                            <p class="text-lg font-bold text-white/60">Drop your image here</p>
                            <p class="text-[10px] font-black text-white/20 uppercase tracking-widest mt-1">Supports JPG, PNG, WEBP</p>
                        </div>
                    </div>
                    <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-8 rounded-[2.5rem]">
                </div>

                <!-- Status -->
                <div id="status" class="hidden py-12 flex flex-col items-center gap-4">
                    <div class="loader-ring"></div>
                    <p class="text-xs font-black text-indigo-400 animate-pulse tracking-[0.3em] uppercase">Processing Neural Data...</p>
                </div>

                <!-- Results -->
                <div id="resultArea" class="hidden mt-12 space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <label class="flex items-center gap-2 text-[10px] font-black text-white/30 uppercase tracking-[0.2em] px-2"><i data-lucide="file-text" class="w-3 h-3"></i> OCR Raw Data</label>
                            <div id="rawText" class="bg-black/40 rounded-[2rem] p-8 min-h-[250px] text-sm leading-relaxed border border-white/5 max-h-[400px] overflow-y-auto"></div>
                        </div>
                        <div class="space-y-4">
                            <label class="flex items-center gap-2 text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] px-2"><i data-lucide="languages" class="w-3 h-3"></i> Neural Translation</label>
                            <div id="translatedText" class="bg-indigo-500/[0.03] rounded-[2rem] p-8 min-h-[250px] text-sm leading-relaxed border border-indigo-500/10 max-h-[400px] overflow-y-auto"></div>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-4">
                        <button onclick="saveToFavs()" class="flex-1 py-5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all flex items-center justify-center gap-3 shadow-xl shadow-indigo-600/20">
                            <i data-lucide="star" class="w-4 h-4"></i> Add to Favorites
                        </button>
                        <button onclick="location.reload()" class="px-8 py-5 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/10 transition-all">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script>
        lucide.createIcons();
        let activeText = "";
        let currentView = 'history';

        // Initialize UI
        refreshSidebar();

        const imgInput = document.getElementById('imageInput');
        document.getElementById('dropZone').onclick = () => imgInput.click();

        imgInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Preview
            const reader = new FileReader();
            reader.onload = (f) => {
                const p = document.getElementById('preview');
                p.src = f.target.result;
                p.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);

            document.getElementById('status').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');

            try {
                // OCR - IMPORTANT: We use 'ara+eng' to support both Arabic and English in the same image
                const result = await Tesseract.recognize(file, 'ara+eng', {
                    logger: m => console.log(m)
                });
                
                activeText = result.data.text;
                if (!activeText.trim()) throw new Error("No readable text");
                
                document.getElementById('rawText').innerText = activeText;
                await translateOnly();
                
                // Save to history
                saveLocal('history', { 
                    raw: activeText, 
                    trans: document.getElementById('translatedText').innerText,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                });

            } catch (err) {
                alert("OCR Error: Ensure the image has clear text and try again.");
                document.getElementById('status').classList.add('hidden');
            }
        };

        async function translateOnly() {
            if (!activeText) return;
            const target = document.getElementById('targetLanguage').value;
            
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(activeText)}`);
                const data = await res.json();
                const text = data[0].map(s => s[0]).join('');
                
                const out = document.getElementById('translatedText');
                out.innerText = text;
                out.dir = ['ar', 'fa', 'ur', 'he'].includes(target) ? 'rtl' : 'ltr';
                
                document.getElementById('status').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) { console.error("Translation Failed"); }
        }

        // Logic for Local Storage
        function saveLocal(key, data) {
            let store = JSON.parse(localStorage.getItem(key) || '[]');
            if (key === 'favs' && store.some(i => i.raw === data.raw)) return;
            store.unshift(data);
            localStorage.setItem(key, JSON.stringify(store.slice(0, 20)));
            refreshSidebar();
            if (key === 'favs') showFlash();
        }

        function switchTab(t) {
            currentView = t;
            document.getElementById('tabHistory').className = `flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${t==='history'?'bg-indigo-600 shadow-lg shadow-indigo-600/20':'hover:bg-white/5'}`;
            document.getElementById('tabFavs').className = `flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest ${t==='favs'?'bg-indigo-600 shadow-lg shadow-indigo-600/20':'hover:bg-white/5'}`;
            refreshSidebar();
        }

        function refreshSidebar() {
            const list = document.getElementById('sideContent');
            const items = JSON.parse(localStorage.getItem(currentView === 'history' ? 'history' : 'favs') || '[]');
            
            list.innerHTML = items.length ? '' : `<div class="h-full flex flex-col items-center justify-center opacity-10 py-20"><i data-lucide="database" class="w-8 h-8 mb-2"></i><p class="text-[10px] font-black">EMPTY</p></div>`;
            
            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="history-item p-4 bg-white/[0.02] rounded-2xl cursor-pointer group" onclick="reLoad('${index}')">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[8px] font-black text-indigo-500 uppercase">${currentView === 'history' ? item.time : 'SAVED'}</span>
                            <i data-lucide="chevron-right" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-all text-indigo-400"></i>
                        </div>
                        <p class="text-[11px] font-bold truncate opacity-60">${item.raw}</p>
                        <p class="text-[10px] truncate text-indigo-300/50 mt-1">${item.trans}</p>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function reLoad(idx) {
            const items = JSON.parse(localStorage.getItem(currentView === 'history' ? 'history' : 'favs') || '[]');
            const itm = items[idx];
            activeText = itm.raw;
            document.getElementById('rawText').innerText = itm.raw;
            document.getElementById('translatedText').innerText = itm.trans;
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('preview').classList.add('hidden');
        }

        function saveToFavs() {
            if(!activeText) return;
            saveLocal('favs', { raw: activeText, trans: document.getElementById('translatedText').innerText });
        }

        function showFlash() {
            const s = document.getElementById('saveIndicator');
            s.style.opacity = "1";
            setTimeout(() => s.style.opacity = "0", 2500);
        }
    </script>
</body>
</html>
